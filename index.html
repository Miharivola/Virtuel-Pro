<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pronostic Vital</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-900 select-none">

    <!-- Header ambony -->
    <header class="bg-white p-4 flex items-center justify-between border-b border-gray-200 sticky top-0 z-50 shadow-xs">
        <div class="flex items-center gap-2">
            <span class="text-xl">⚙️</span>
            <h1 class="text-xl font-bold text-gray-800">Pronostic Vital</h1>
        </div>
        <div class="flex items-center gap-3 text-lg">
            <span class="cursor-pointer">ℹ️</span>
            <span class="cursor-pointer">🔔</span>
            <span class="cursor-pointer">⭐</span>
        </div>
    </header>

    <!-- Fitaovana Fifantenana Ligy -->
    <nav class="bg-white p-2 flex items-center gap-2 overflow-x-auto border-b border-gray-200 no-scrollbar">
        <button class="px-4 py-1.5 rounded-full text-xs font-semibold bg-gray-100 text-gray-700 whitespace-nowrap">🟢 Toutes les Ligues</button>
        <button class="px-4 py-1.5 rounded-full text-xs font-semibold bg-green-600 text-white whitespace-nowrap">🏆 Coupe d'Afrique</button>
        <button class="px-4 py-1.5 rounded-full text-xs font-semibold bg-gray-100 text-gray-700 whitespace-nowrap">🇪🇺 Ligue des Champions</button>
        <button class="px-4 py-1.5 rounded-full text-xs font-semibold bg-gray-100 text-gray-700 whitespace-nowrap">🏴 Presmier League</button>
    </nav>

    <main class="p-3 max-w-md mx-auto">
        <!-- Boaty Lehibe an'ny Ligy -->
        <div class="bg-white p-3 rounded-xl shadow-xs border border-gray-200 mb-3">
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-2">
                    <span class="text-xl">🏆</span>
                    <h2 class="text-md font-bold text-gray-800 tracking-wide">COUPE D'AFRIQUE</h2>
                </div>
                <span class="text-[10px] font-bold text-gray-500 bg-gray-100 px-2 py-0.5 rounded">12 MATCHS</span>
            </div>

            <!-- Tabs: RÉSULTATS, MATCHS, CLASSEMENT -->
            <div class="grid grid-cols-3 gap-1 border-b border-gray-200 pb-2 mb-3 text-center text-xs font-bold">
                <button class="py-1 text-gray-400">RÉSULTATS</button>
                <button class="py-1 text-green-600 border-b-2 border-green-600">MATCHS</button>
                <button class="py-1 text-gray-400">CLASSEMENT</button>
            </div>

            <!-- Tsingerina dynamic 2 minitra miaraka amin'ny famantaranandro -->
            <div class="flex items-center gap-1.5 overflow-x-auto text-[11px] font-bold text-gray-600 no-scrollbar" id="time-slots">
                <!-- Hamboarin'ny JavaScript -->
            </div>
        </div>

        <!-- Bokotra Fifantenana karazana Bet (1X2, DC, OU, BTTS, CS) -->
        <div class="flex items-center gap-1.5 overflow-x-auto pb-3 no-scrollbar text-[11px] font-bold">
            <button onclick="changeTab('1X2')" id="btn-1X2" class="px-3 py-1.5 rounded bg-green-600 text-white shadow-xs">1X2</button>
            <button onclick="changeTab('DC')" id="btn-DC" class="px-3 py-1.5 rounded bg-gray-200 text-gray-700">DOUBLE CHANCE</button>
            <button onclick="changeTab('OU')" id="btn-OU" class="px-3 py-1.5 rounded bg-gray-200 text-gray-700">OVER/UNDER</button>
            <button onclick="changeTab('BTTS')" id="btn-BTTS" class="px-3 py-1.5 rounded bg-gray-200 text-gray-700">BTTS</button>
            <button onclick="changeTab('CS')" id="btn-CS" class="px-3 py-1.5 rounded bg-gray-200 text-gray-700">CORRECT SCORE</button>
        </div>

        <!-- Loham-pahaizan'ny Tabilao (Grid Headers) -->
        <div class="bg-white p-3 rounded-t-xl border border-gray-200 border-b-0">
            <div class="grid grid-cols-4 gap-1 text-center text-[10px] font-bold text-gray-400 tracking-wider">
                <div class="text-left">MATCHS DU JOUR</div>
                <div id="col-header-1">1</div>
                <div id="col-header-2">X</div>
                <div id="col-header-3">SCORE PRÉDIT</div>
            </div>
        </div>

        <!-- Ny tabilao misy lalao sy simulation -->
        <div class="bg-white rounded-b-xl border border-gray-200 divide-y divide-gray-100 shadow-xs mb-20" id="matches-container">
            <!-- Ny JavaScript no hampiditra ny lalao 10 eto -->
        </div>
    </main>

    <script>
        let currentTab = '1X2';
        let currentMatchesData = [];

        const teams = [
            { name: "BENIN", flag: "🇧🇯" }, { name: "OUGANDA", flag: "🇺🇬" },
            { name: "CÔTE D'IVOIRE", flag: "🇨🇮" }, { name: "GUINÉE ÉQ.", flag: "🇬🇶" },
            { name: "GABON", flag: "🇬🇦" }, { name: "ANGOLA", flag: "🇦🇴" },
            { name: "MALI", flag: "🇲🇱" }, { name: "GHANA", flag: "🇬🇭" },
            { name: "MAROC", flag: "🇲🇦" }, { name: "BURKINA FASO", flag: "🇧🇫" },
            { name: "CAMEROUN", flag: "🇨🇲" }, { name: "NIGERIA", flag: "🇳🇬" },
            { name: "RDC CONGO", flag: "🇨🇩" }, { name: "ÉGYPTE", flag: "🇪🇬" },
            { name: "ZAMBIE", flag: "🇿🇲" }, { name: "MOZAMBIQUE", flag: "🇲🇿" },
            { name: "SÉNÉGAL", flag: "🇸🇳" }, { name: "TUNISIE", flag: "🇹🇳" },
            { name: "AFRIQUE DU SUD", flag: "🇿🇦" }, { name: "ALGERIE", flag: "🇩🇿" }
        ];

        function generateMatchData() {
            let data = [];
            let shuffled = [...teams].sort(() => 0.5 - Math.random());
            
            for (let i = 0; i < 10; i++) {
                let home = shuffled[i * 2];
                let away = shuffled[i * 2 + 1];
                
                // Algorithm RNG predictive mamorona ny score sy ny antsipiriany
                let scoreHome = Math.floor(Math.random() * 3);
                let scoreAway = Math.floor(Math.random() * 3);
                let totalGoals = scoreHome + scoreAway;
                let bttsOui = (scoreHome > 0 && scoreAway > 0);
                
                data.push({
                    home: home,
                    away: away,
                    scores: { home: scoreHome, away: scoreAway },
                    proba: Math.floor(30 + Math.random() * 60),
                    // Kajy ny tahan'ny odds ho an'ny tabs rehetra
                    odds: {
                        '1X2': { 
                            c1: (1.4 + Math.random() * 2).toFixed(2), 
                            c2: (2.0 + Math.random() * 2.5).toFixed(2) 
                        },
                        'DC': { 
                            c1: (1.1 + Math.random() * 0.4).toFixed(2), 
                            c2: (1.2 + Math.random() * 0.5).toFixed(2) 
                        },
                        'OU': { 
                            c1: (1.4 + Math.random() * 1.2).toFixed(2), 
                            c2: (1.3 + Math.random() * 1.1).toFixed(2) 
                        },
                        'BTTS': { 
                            c1: (1.5 + Math.random() * 0.9).toFixed(2), 
                            c2: (1.4 + Math.random() * 0.8).toFixed(2) 
                        },
                        'CS': { 
                            c1: `${scoreHome}-${scoreAway}`, 
                            c2: `${Math.floor(Math.random()*3)}-${Math.floor(Math.random()*3)}` 
                        }
                    }
                });
            }
            return data;
        }

        function updateTimelineAndTimer() {
            const now = new Date();
            const container = document.getElementById('time-slots');
            if (!container) return;
            container.innerHTML = '';

            let currentMinutes = now.getMinutes();
            let startMinute = currentMinutes - (currentMinutes % 2);
            
            let baseTime = new Date(now.getTime());
            baseTime.setMinutes(startMinute);
            baseTime.setSeconds(0);

            let nextCycle = new Date(baseTime.getTime() + 2 * 60 * 1000);
            let diffMs = nextCycle - now;
            let diffMin = Math.floor(diffMs / 60000);
            let diffSec = Math.floor((diffMs % 60000) / 1000);
            let countdownStr = `${String(diffMin).padStart(2, '0')}:${String(diffSec).padStart(2, '0')}`;

            for (let i = -3; i <= 2; i++) {
                let slotTime = new Date(baseTime.getTime() + (i * 2) * 60 * 1000);
                let hours = String(slotTime.getHours()).padStart(2, '0');
                let mins = String(slotTime.getMinutes()).padStart(2, '0');
                let timeStr = `${hours}:${mins}`;

                let span = document.createElement('span');
                if (i === 0) {
                    span.className = "px-2.5 py-1 rounded bg-red-600 text-white font-extrabold shadow-sm flex flex-col items-center";
                    span.innerHTML = `<div>${timeStr}</div><div class="text-[9px] font-normal text-red-100">${countdownStr}</div>`;
                } else {
                    span.className = "px-2.5 py-1.5 rounded bg-gray-50 text-gray-500 border border-gray-100";
                    span.innerText = timeStr;
                }
                container.appendChild(span);
            }
        }

        function changeTab(tab) {
            currentTab = tab;
            ['1X2', 'DC', 'OU', 'BTTS', 'CS'].forEach(t => {
                const btn = document.getElementById(`btn-${t}`);
                if (t === tab) {
                    btn.className = "px-3 py-1.5 rounded bg-green-600 text-white shadow-xs";
                } else {
                    btn.className = "px-3 py-1.5 rounded bg-gray-200 text-gray-700";
                }
            });

            const h1 = document.getElementById('col-header-1');
            const h2 = document.getElementById('col-header-2');
            const h3 = document.getElementById('col-header-3');

            if (tab === '1X2') { h1.innerText = '1'; h2.innerText = 'X'; h3.innerText = 'SCORE PRÉDIT'; }
            else if (tab === 'DC') { h1.innerText = '1X'; h2.innerText = '12'; h3.innerText = 'SCORE PRÉDIT'; }
            else if (tab === 'OU') { h1.innerText = 'OVER 2.5'; h2.innerText = 'UNDER 2.5'; h3.innerText = 'SCORE PRÉDIT'; }
            else if (tab === 'BTTS') { h1.innerText = 'OUI'; h2.innerText = 'NON'; h3.innerText = 'SCORE PRÉDIT'; }
            else if (tab === 'CS') { h1.innerText = 'PRÉDI'; h2.innerText = 'ALT'; h3.innerText = 'PROBA'; }

            renderMatches();
        }

        function renderMatches() {
            const container = document.getElementById('matches-container');
            if (!container) return;
            container.innerHTML = '';

            const now = new Date();
            let currentMinutes = now.getMinutes();
            let startMinute = currentMinutes - (currentMinutes % 2);
            let hours = String(now.getHours()).padStart(2, '0');
            let mins = String(startMinute).padStart(2, '0');
            let matchTime = `${hours}:${mins}`;

            currentMatchesData.forEach(match => {
                let row = document.createElement('div');
                row.className = "grid grid-cols-4 items-center gap-1.5 p-2.5 text-xs font-semibold";

                let col1_content = "";
                let col2_content = "";
                let col3_content = "";

                let tabOdds = match.odds[currentTab];

                if (currentTab === 'CS') {
                    // Ho an'ny Correct score dia score roa no aseho eo amin'ny boaty roa voalohany
                    col1_content = `<div class="text-[9px] text-gray-400 font-normal">PREDI</div><div class="text-gray-900 font-extrabold mt-0.5">${tabOdds.c1}</div>`;
                    col2_content = `<div class="text-[9px] text-gray-400 font-normal">ALT</div><div class="text-gray-900 font-extrabold mt-0.5">${tabOdds.c2}</div>`;
                    col3_content = `<div class="font-black text-green-800 text-sm tracking-tighter">${match.proba}%</div>`;
                } else {
                    col1_content = `<div class="text-[9px] text-gray-400 font-normal">${document.getElementById('col-header-1').innerText}</div><div class="text-gray-900 font-extrabold mt-0.5">${tabOdds.c1}</div>`;
                    col2_content = `<div class="text-[9px] text-gray-400 font-normal">${document.getElementById('col-header-2').innerText}</div><div class="text-gray-900 font-extrabold mt-0.5">${tabOdds.c2}</div>`;
                    col3_content = `<div class="font-black text-green-800 text-sm tracking-tighter">${match.scores.home}-${match.scores.away}</div><div class="text-[9px] text-green-600 font-bold bg-green-100 px-1.5 py-0.2 rounded-full mt-0.5">(${match.proba}%)</div>`;
                }

                row.innerHTML = `
                    <div class="flex flex-col justify-center">
                        <div class="text-[9px] text-gray-400 font-normal mb-1">🕒 ${matchTime}</div>
                        <div class="flex items-center gap-1 text-gray-800 font-bold truncate"><span>${match.home.flag}</span> <span>${match.home.name}</span></div>
                        <div class="flex items-center gap-1 text-gray-800 font-bold truncate mt-0.5"><span>${match.away.flag}</span> <span>${match.away.name}</span></div>
                    </div>
                    <div class="bg-gray-50 border border-gray-200 py-2 rounded-lg text-center active:scale-95 transition-transform">
                        ${col1_content}
                    </div>
                    <div class="bg-gray-50 border border-gray-200 py-2 rounded-lg text-center active:scale-95 transition-transform">
                        ${col2_content}
                    </div>
                    <div class="bg-green-50 border border-green-200 py-1.5 rounded-lg text-center flex flex-col items-center justify-center">
                        ${col3_content}
                    </div>
                `;
                container.appendChild(row);
            });
        }

        // Fanombohana voalohany ny data
        currentMatchesData = generateMatchData();

        setInterval(() => {
            updateTimelineAndTimer();
            const now = new Date();
            // Isaky ny 2 minitra katroka (00 segondra) dia manavao ny lalao rehetra
            if (now.getSeconds() === 0 && now.getMinutes() % 2 === 0) {
                currentMatchesData = generateMatchData();
                renderMatches();
            }
        }, 1000);

        updateTimelineAndTimer();
        renderMatches();
    </script>
</body>
</html>
