<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pronostic Vital</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-900 select-none">

    <!-- Header ambony -->
    <header class="bg-white p-4 flex items-center justify-between border-b border-gray-200 sticky top-0 z-50 shadow-xs">
        <div class="flex items-center gap-2">
            <span class="text-xl">⚙️</span>
            <h1 class="text-xl font-bold text-gray-800">Pronostic Vital</h1>
        </div>
        <div class="flex items-center gap-3 text-lg">
            <span class="cursor-pointer">ℹ️</span>
            <span class="cursor-pointer">🔔</span>
            <span class="cursor-pointer">⭐</span>
        </div>
    </header>

    <!-- Fitaovana Fifantenana Ligy -->
    <nav class="bg-white p-2 flex items-center gap-2 overflow-x-auto border-b border-gray-200 no-scrollbar">
        <button class="px-4 py-1.5 rounded-full text-xs font-semibold bg-gray-100 text-gray-700 whitespace-nowrap">🟢 Toutes les Ligues</button>
        <button class="px-4 py-1.5 rounded-full text-xs font-semibold bg-green-600 text-white whitespace-nowrap">🏆 Coupe d'Afrique</button>
        <button class="px-4 py-1.5 rounded-full text-xs font-semibold bg-gray-100 text-gray-700 whitespace-nowrap">🇪🇺 Ligue des Champions</button>
        <button class="px-4 py-1.5 rounded-full text-xs font-semibold bg-gray-100 text-gray-700 whitespace-nowrap">🏴 Premier League</button>
    </nav>

    <main class="p-3 max-w-md mx-auto">
        <!-- Boaty Lehibe an'ny Ligy -->
        <div class="bg-white p-3 rounded-xl shadow-xs border border-gray-200 mb-3">
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-2">
                    <span class="text-xl">🏆</span>
                    <h2 class="text-md font-bold text-gray-800 tracking-wide">COUPE D'AFRIQUE</h2>
                </div>
                <span class="text-[10px] font-bold text-gray-500 bg-gray-100 px-2 py-0.5 rounded">12 MATCHS</span>
            </div>

            <!-- Tabs: RÉSULTATS, MATCHS, CLASSEMENT -->
            <div class="grid grid-cols-3 gap-1 border-b border-gray-200 pb-2 mb-3 text-center text-xs font-bold">
                <button onclick="changeSection('RÉSULTATS')" id="sec-RÉSULTATS" class="py-1 text-gray-400">RÉSULTATS</button>
                <button onclick="changeSection('MATCHS')" id="sec-MATCHS" class="py-1 text-green-600 border-b-2 border-green-600">MATCHS</button>
                <button onclick="changeSection('CLASSEMENT')" id="sec-CLASSEMENT" class="py-1 text-gray-400">CLASSEMENT</button>
            </div>

            <!-- Tsingerina 2 minitra miaraka amin'ny famantaranandro -->
            <div class="flex items-center gap-1.5 overflow-x-auto text-[11px] font-bold text-gray-600 no-scrollbar" id="time-slots">
                <!-- JavaScript -->
            </div>
        </div>

        <!-- Fizarana MATCHS sy RÉSULTATS (Bokotra ambony tabilao) -->
        <div id="subtabs-container" class="block">
            <div class="flex items-center gap-1.5 overflow-x-auto pb-3 no-scrollbar text-[11px] font-bold">
                <button onclick="changeTab('1X2')" id="btn-1X2" class="px-3 py-1.5 rounded bg-green-600 text-white shadow-xs">1X2</button>
                <button onclick="changeTab('DC')" id="btn-DC" class="px-3 py-1.5 rounded bg-gray-200 text-gray-700">DOUBLE CHANCE</button>
                <button onclick="changeTab('OU')" id="btn-OU" class="px-3 py-1.5 rounded bg-gray-200 text-gray-700">OVER/UNDER</button>
                <button onclick="changeTab('BTTS')" id="btn-BTTS" class="px-3 py-1.5 rounded bg-gray-200 text-gray-700">BTTS</button>
                <button onclick="changeTab('CS')" id="btn-CS" class="px-3 py-1.5 rounded bg-gray-200 text-gray-700">CORRECT SCORE</button>
            </div>
        </div>

        <!-- Ny Loham-pahaizan'ny Tabilao Dynamic -->
        <div class="bg-white p-3 rounded-t-xl border border-gray-200 border-b-0" id="table-header">
            <!-- JavaScript no manova ity araka ny Section -->
        </div>

        <!-- Votoatin'ny tabilao (Dynamic Container) -->
        <div class="bg-white rounded-b-xl border border-gray-200 divide-y divide-gray-100 shadow-xs mb-20" id="main-content-container">
            <!-- Lalao / Vokatra / Filaharana no hiditra eto -->
        </div>
    </main>

    <script>
        let currentSection = 'MATCHS';
        let currentTab = '1X2';
        let currentMatchesData = [];
        let historicalResults = [];
        let leagueStandings = [];

        const teams = [
            { name: "BENIN", flag: "🇧🇯" }, { name: "OUGANDA", flag: "🇺🇬" },
            { name: "CÔTE D'IVOIRE", flag: "🇨🇮" }, { name: "GUINÉE ÉQ.", flag: "🇬🇶" },
            { name: "GABON", flag: "🇬🇦" }, { name: "ANGOLA", flag: "🇦🇴" },
            { name: "MALI", flag: "🇲🇱" }, { name: "GHANA", flag: "🇬🇭" },
            { name: "MAROC", flag: "🇲🇦" }, { name: "BURKINA FASO", flag: "🇧🇫" },
            { name: "CAMEROUN", flag: "🇨🇲" }, { name: "NIGERIA", flag: "🇳🇬" },
            { name: "RDC CONGO", flag: "🇨🇩" }, { name: "ÉGYPTE", flag: "🇪🇬" },
            { name: "ZAMBIE", flag: "🇿🇲" }, { name: "MOZAMBIQUE", flag: "🇲🇿" },
            { name: "SÉNÉGAL", flag: "🇸🇳" }, { name: "TUNISIE", flag: "🇹🇳" },
            { name: "AFRIQUE DU SUD", flag: "🇿🇦" }, { name: "ALGERIE", flag: "🇩🇿" }
        ];

        // Famoronana filaharana voalohany (Standings Init)
        function initStandings() {
            leagueStandings = teams.map(t => ({
                team: t, pts: Math.floor(Math.random() * 45), j: Math.floor(20 + Math.random() * 5), diff: Math.floor(Math.random() * 20) - 10
            })).sort((a, b) => b.pts - a.pts);
        }

        function generateMatchData(timeStr) {
            let data = [];
            let shuffled = [...teams].sort(() => 0.5 - Math.random());
            
            for (let i = 0; i < 10; i++) {
                let home = shuffled[i * 2];
                let away = shuffled[i * 2 + 1];
                let scoreHome = Math.floor(Math.random() * 4);
                let scoreAway = Math.floor(Math.random() * 4);
                
                data.push({
                    time: timeStr,
                    home: home,
                    away: away,
                    scores: { home: scoreHome, away: scoreAway },
                    proba: Math.floor(35 + Math.random() * 55),
                    odds: {
                        '1X2': { c1: (1.4 + Math.random() * 1.8).toFixed(2), c2: (1.9 + Math.random() * 2.2).toFixed(2) },
                        'DC': { c1: (1.1 + Math.random() * 0.3).toFixed(2), c2: (1.2 + Math.random() * 0.4).toFixed(2) },
                        'OU': { c1: (1.5 + Math.random() * 1.0).toFixed(2), c2: (1.4 + Math.random() * 0.9).toFixed(2) },
                        'BTTS': { c1: (1.6 + Math.random() * 0.7).toFixed(2), c2: (1.4 + Math.random() * 0.6).toFixed(2) },
                        'CS': { c1: `${scoreHome}-${scoreAway}`, c2: `${Math.floor(Math.random()*3)}-${Math.floor(Math.random()*3)}` }
                    }
                });
            }
            return data;
        }

        // Fampidirana ny lalao ho an'ny tantara (Results)
        function archiveCurrentMatchesToResults() {
            if (currentMatchesData.length > 0) {
                // Tazonina ny 30 farany ihany tsy ho mavesatra ny Honor 8X
                historicalResults = [...currentMatchesData, ...historicalResults].slice(0, 30);
                
                // Fanavaozana ny Classement araka ny vokatry ny lalao
                currentMatchesData.forEach(m => {
                    let hTeam = leagueStandings.find(s => s.team.name === m.home.name);
                    let aTeam = leagueStandings.find(s => s.team.name === m.away.name);
                    if(hTeam && aTeam) {
                        hTeam.j += 1; aTeam.j += 1;
                        hTeam.diff += (m.scores.home - m.scores.away);
                        aTeam.diff += (m.scores.away - m.scores.home);
                        if(m.scores.home > m.scores.away) hTeam.pts += 3;
                        else if(m.scores.home < m.scores.away) aTeam.pts += 3;
                        else { hTeam.pts += 1; aTeam.pts += 1; }
                    }
                });
                leagueStandings.sort((a, b) => b.pts - a.pts);
            }
        }

        function updateTimelineAndTimer() {
            const now = new Date();
            const container = document.getElementById('time-slots');
            if (!container) return;
            container.innerHTML = '';

            let currentMinutes = now.getMinutes();
            let startMinute = currentMinutes - (currentMinutes % 2);
            
            let baseTime = new Date(now.getTime());
            baseTime.setMinutes(startMinute);
            baseTime.setSeconds(0);

            let nextCycle = new Date(baseTime.getTime() + 2 * 60 * 1000);
            let diffMs = nextCycle - now;
            let diffMin = Math.floor(diffMs / 60000);
            let diffSec = Math.floor((diffMs % 60000) / 1000);
            let countdownStr = `${String(diffMin).padStart(2, '0')}:${String(diffSec).padStart(2, '0')}`;

            for (let i = -3; i <= 2; i++) {
                let slotTime = new Date(baseTime.getTime() + (i * 2) * 60 * 1000);
                let hours = String(slotTime.getHours()).padStart(2, '0');
                let mins = String(slotTime.getMinutes()).padStart(2, '0');
                let timeStr = `${hours}:${mins}`;

                let span = document.createElement('span');
                if (i === 0) {
                    span.className = "px-2.5 py-1 rounded bg-red-600 text-white font-extrabold shadow-sm flex flex-col items-center cursor-pointer";
                    span.innerHTML = `<div>${timeStr}</div><div class="text-[9px] font-normal text-red-100">${countdownStr}</div>`;
                    span.onclick = () => changeSection('MATCHS');
                } else {
                    span.className = "px-2.5 py-1.5 rounded bg-gray-50 text-gray-500 border border-gray-100 cursor-pointer hover:bg-gray-100";
                    span.innerText = timeStr;
                    // Raha tsindrina ny lera taloha dia mandeha any amin'ny Résultat
                    if (i < 0) span.onclick = () => changeSection('RÉSULTATS');
                }
                container.appendChild(span);
            }
        }

        function changeSection(section) {
            currentSection = section;
            ['RÉSULTATS', 'MATCHS', 'CLASSEMENT'].forEach(sec => {
                const btn = document.getElementById(`sec-${sec}`);
                if (sec === section) {
                    btn.className = "py-1 text-green-600 border-b-2 border-green-600";
                } else {
                    btn.className = "py-1 text-gray-400";
                }
            });

            const subtabs = document.getElementById('subtabs-container');
            if (section === 'CLASSEMENT') subtabs.className = "hidden";
            else subtabs.className = "block";

            renderContent();
        }

        function changeTab(tab) {
            currentTab = tab;
            ['1X2', 'DC', 'OU', 'BTTS', 'CS'].forEach(t => {
                const btn = document.getElementById(`btn-${t}`);
                btn.className = (t === tab) ? "px-3 py-1.5 rounded bg-green-600 text-white shadow-xs" : "px-3 py-1.5 rounded bg-gray-200 text-gray-700";
            });
            renderContent();
        }

        function renderContent() {
            const header = document.getElementById('table-header');
            const container = document.getElementById('main-content-container');
            if (!header || !container) return;
            container.innerHTML = '';

            if (currentSection === 'CLASSEMENT') {
                header.innerHTML = `
                    <div class="grid grid-cols-12 gap-1 text-center text-[10px] font-bold text-gray-400 tracking-wider">
                        <div class="col-span-2 text-left">POS</div>
                        <div class="col-span-4 text-left">EQUIPE</div>
                        <div class="col-span-2">J</div>
                        <div class="col-span-2">DIFF</div>
                        <div class="col-span-2 text-green-600">PTS</div>
                    </div>
                `;
                leagueStandings.forEach((row, index) => {
                    let div = document.createElement('div');
                    div.className = "grid grid-cols-12 items-center gap-1 p-2.5 text-xs font-semibold text-gray-700";
                    div.innerHTML = `
                        <div class="col-span-2 text-gray-400 font-bold">${index + 1}</div>
                        <div class="col-span-4 flex items-center gap-1 font-bold truncate"><span>${row.team.flag}</span> <span>${row.team.name}</span></div>
                        <div class="col-span-2 text-center text-gray-500">${row.j}</div>
                        <div class="col-span-2 text-center ${row.diff >= 0 ? 'text-blue-600' : 'text-red-500'}">${row.diff > 0 ? '+' + row.diff : row.diff}</div>
                        <div class="col-span-2 text-center font-black text-gray-900">${row.pts}</div>
                    `;
                    container.appendChild(div);
                });
            } 
            else if (currentSection === 'RÉSULTATS') {
                header.innerHTML = `
                    <div class="grid grid-cols-4 gap-1 text-center text-[10px] font-bold text-gray-400 tracking-wider">
                        <div class="text-left">MATCHS PASSÉS</div>
                        <div>SCORE FINAL</div>
                        <div>TOTAL BUTS</div>
                        <div>STATUS</div>
                    </div>
                `;
                if (historicalResults.length === 0) {
                    container.innerHTML = `<div class="p-6 text-center text-xs text-gray-400 font-bold">Aucun match terminé pour le moment. Attendez le prochain cycle.</div>`;
                    return;
                }
                historicalResults.forEach(match => {
                    let row = document.createElement('div');
                    row.className = "grid grid-cols-4 items-center gap-1.5 p-2.5 text-xs font-semibold";
                    let tot = match.scores.home + match.scores.away;
                    row.innerHTML = `
                        <div class="flex flex-col justify-center">
                            <div class="text-[9px] text-red-500 font-bold mb-1">● TERMINE (${match.time})</div>
                            <div class="flex items-center gap-1 text-gray-800 font-bold truncate"><span>${match.home.flag}</span> <span>${match.home.name}</span></div>
                            <div class="flex items-center gap-1 text-gray-800 font-bold truncate mt-0.5"><span>${match.away.flag}</span> <span>${match.away.name}</span></div>
                        </div>
                        <div class="bg-gray-100 border border-gray-200 py-2 rounded-lg text-center font-black text-gray-900 text-sm">
                            ${match.scores.home} - ${match.scores.away}
                        </div>
                        <div class="bg-gray-50 border border-gray-200 py-2 rounded-lg text-center font-bold text-gray-600">
                            ${tot} (${tot > 2.5 ? 'O2.5' : 'U2.5'})
                        </div>
                        <div class="bg-blue-50 border border-blue-200 py-2 rounded-lg text-center text-[10px] font-bold text-blue-700">
                            VALIDÉ
                        </div>
                    `;
                    container.appendChild(row);
                });
            } 
            else {
                // Fizarana MATCHS (Ilay efa mahazatra teo)
                let h1 = '1', h2 = 'X', h3 = 'SCORE PRÉDIT';
                if (currentTab === 'DC') { h1 = '1X'; h2 = '12'; }
                else if (currentTab === 'OU') { h1 = 'OVER 2.5'; h2 = 'UNDER 2.5'; }
                else if (currentTab === 'BTTS') { h1 = 'OUI'; h2 = 'NON'; }
                else if (currentTab === 'CS') { h1 = 'PRÉDI'; h2 = 'ALT'; h3 = 'PROBA'; }

                header.innerHTML = `
                    <div class="grid grid-cols-4 gap-1 text-center text-[10px] font-bold text-gray-400 tracking-wider">
                        <div class="text-left">MATCHS DU JOUR</div>
                        <div>${h1}</div>
                        <div>${h2}</div>
                        <div>${h3}</div>
                    </div>
                `;

                currentMatchesData.forEach(match => {
                    let row = document.createElement('div');
                    row.className = "grid grid-cols-4 items-center gap-1.5 p-2.5 text-xs font-semibold";
                    let tabOdds = match.odds[currentTab];
                    let col1 = "", col2 = "", col3 = "";

                    if (currentTab === 'CS') {
                        col1 = `<div class="text-[9px] text-gray-400 font-normal">PREDI</div><div class="text-gray-900 font-extrabold mt-0.5">${tabOdds.c1}</div>`;
                        col2 = `<div class="text-[9px] text-gray-400 font-normal">ALT</div><div class="text-gray-900 font-extrabold mt-0.5">${tabOdds.c2}</div>`;
                        col3 = `<div class="font-black text-green-800 text-sm tracking-tighter">${match.proba}%</div>`;
                    } else {
                        col1 = `<div class="text-[9px] text-gray-400 font-normal">${h1}</div><div class="text-gray-900 font-extrabold mt-0.5">${tabOdds.c1}</div>`;
                        col2 = `<div class="text-[9px] text-gray-400 font-normal">${h2}</div><div class="text-gray-900 font-extrabold mt-0.5">${tabOdds.c2}</div>`;
                        col3 = `<div class="font-black text-green-800 text-sm tracking-tighter">${match.scores.home}-${match.scores.away}</div><div class="text-[9px] text-green-600 font-bold bg-green-100 px-1.5 py-0.2 rounded-full mt-0.5">(${match.proba}%)</div>`;
                    }

                    row.innerHTML = `
                        <div class="flex flex-col justify-center">
                            <div class="text-[9px] text-gray-400 font-normal mb-1">🕒 ${match.time}</div>
                            <div class="flex items-center gap-1 text-gray-800 font-bold truncate"><span>${match.home.flag}</span> <span>${match.home.name}</span></div>
                            <div class="flex items-center gap-1 text-gray-800 font-bold truncate mt-0.5"><span>${match.away.flag}</span> <span>${match.away.name}</span></div>
                        </div>
                        <div class="bg-gray-50 border border-gray-200 py-2 rounded-lg text-center active:scale-95 transition-transform">${col1}</div>
                        <div class="bg-gray-50 border border-gray-200 py-2 rounded-lg text-center active:scale-95 transition-transform">${col2}</div>
                        <div class="bg-green-50 border border-green-200 py-1.5 rounded-lg text-center flex flex-col items-center justify-center">${col3}</div>
                    `;
                    container.appendChild(row);
                });
            }
        }

        // Fampandehanana ny lera sy tsingerina
        const now = new Date();
        let currentMinutes = now.getMinutes();
        let startMinute = currentMinutes - (currentMinutes % 2);
        let initHours = String(now.getHours()).padStart(2, '0');
        let initMins = String(startMinute).padStart(2, '0');
        
        initStandings();
        currentMatchesData = generateMatchData(`${initHours}:${initMins}`);

        setInterval(() => {
            updateTimelineAndTimer();
            const checkTime = new Date();
            // Rehefa miova 2 minitra (00s katroka)
            if (checkTime.getSeconds() === 0 && checkTime.getMinutes() % 2 === 0) {
                archiveCurrentMatchesToResults();
                let nextH = String(checkTime.getHours()).padStart(2, '0');
                let nextM = String(checkTime.getMinutes()).padStart(2, '0');
                currentMatchesData = generateMatchData(`${nextH}:${nextM}`);
                renderContent();
            }
        }, 1000);

        updateTimelineAndTimer();
        renderContent();
    </script>
</body>
</html>
