<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pronostic Vital</title>
    <!-- Tailwind CSS ho an'ny endrika tsara tarehy sy maivana -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* CSS fanampiny ho an'ny scrollbar maivana */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-900 select-none">

    <!-- Header ambony -->
    <header class="bg-white p-4 flex items-center justify-between border-b border-gray-200 sticky top-0 z-50 shadow-xs">
        <div class="flex items-center gap-2">
            <span class="text-xl">⚙️</span>
            <h1 class="text-xl font-bold text-gray-800">Pronostic Vital</h1>
        </div>
        <div class="flex items-center gap-3 text-lg">
            <span class="cursor-pointer">ℹ️</span>
            <span class="cursor-pointer">🔔</span>
            <span class="cursor-pointer">⭐</span>
        </div>
    </header>

    <!-- Fitaovana Fifantenana Ligy -->
    <nav class="bg-white p-2 flex items-center gap-2 overflow-x-auto border-b border-gray-200 no-scrollbar">
        <button class="px-4 py-1.5 rounded-full text-xs font-semibold bg-gray-100 text-gray-700 whitespace-nowrap">🟢 Toutes les Ligues</button>
        <button class="px-4 py-1.5 rounded-full text-xs font-semibold bg-green-600 text-white whitespace-nowrap">🏆 Coupe d'Afrique</button>
        <button class="px-4 py-1.5 rounded-full text-xs font-semibold bg-gray-100 text-gray-700 whitespace-nowrap">🇪🇺 Ligue des Champions</button>
        <button class="px-4 py-1.5 rounded-full text-xs font-semibold bg-gray-100 text-gray-700 whitespace-nowrap">🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League</button>
    </nav>

    <main class="p-3 max-w-md mx-auto">
        <!-- Boaty Lehibe an'ny Ligy -->
        <div class="bg-white p-3 rounded-xl shadow-xs border border-gray-200 mb-3">
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-2">
                    <span class="text-xl">🏆</span>
                    <h2 class="text-md font-bold text-gray-800 tracking-wide">COUPE D'AFRIQUE</h2>
                </div>
                <span class="text-[10px] font-bold text-gray-500 bg-gray-100 px-2 py-0.5 rounded">12 MATCHS</span>
            </div>

            <!-- Tabs: RÉSULTATS, MATCHS, CLASSEMENT -->
            <div class="grid grid-cols-3 gap-1 border-b border-gray-200 pb-2 mb-3 text-center text-xs font-bold">
                <button class="py-1 text-gray-400">RÉSULTATS</button>
                <button class="py-1 text-green-600 border-b-2 border-green-600">MATCHS</button>
                <button class="py-1 text-gray-400">CLASSEMENT</button>
            </div>

            <!-- Tsingerina dynamic 2 minitra miaraka amin'ny famantaranandro -->
            <div class="flex items-center gap-1.5 overflow-x-auto text-[11px] font-bold text-gray-600 no-scrollbar" id="time-slots">
                <!-- Hamboarin'ny JavaScript ny lera ho ho avy eto -->
            </div>
        </div>

        <!-- Bokotra Fifantenana karazana Bet (1X2, Over/Under, BTTS...) -->
        <div class="flex items-center gap-1.5 overflow-x-auto pb-3 no-scrollbar text-[11px] font-bold">
            <button onclick="changeTab('1X2')" id="btn-1X2" class="px-3 py-1.5 rounded bg-gray-200 text-gray-700">1X2</button>
            <button onclick="changeTab('DC')" id="btn-DC" class="px-3 py-1.5 rounded bg-gray-200 text-gray-700">DOUBLE CHANCE</button>
            <button onclick="changeTab('OU')" id="btn-OU" class="px-3 py-1.5 rounded bg-green-600 text-white shadow-xs">OVER/UNDER</button>
            <button onclick="changeTab('BTTS')" id="btn-BTTS" class="px-3 py-1.5 rounded bg-gray-200 text-gray-700">BTTS</button>
            <button onclick="changeTab('CS')" id="btn-CS" class="px-3 py-1.5 rounded bg-gray-200 text-gray-700">CORRECT SCORE</button>
        </div>

        <!-- Ny Loham-pahaizan'ny Tabilao (Grid Headers) -->
        <div class="bg-white p-3 rounded-t-xl border border-gray-200 border-b-0">
            <div class="grid grid-cols-4 gap-1 text-center text-[10px] font-bold text-gray-400 tracking-wider">
                <div class="text-left">MATCHS DU JOUR</div>
                <div id="col-header-1">OVER 2.5</div>
                <div id="col-header-2">UNDER 2.5</div>
                <div>SCORE PRÉDIT</div>
            </div>
        </div>

        <!-- Ny tabilao misy lalao sy simulation (10 Lalao - Grid 10x5) -->
        <div class="bg-white rounded-b-xl border border-gray-200 divide-y divide-gray-100 shadow-xs mb-20" id="matches-container">
            <!-- Ny JavaScript no hampiditra ny lalao 10 eto -->
        </div>
    </main>

    <!-- JavaScript misahana ny Lojika dynamic rehetra -->
    <script>
        let currentTab = 'OU';
        const teams = [
            { name: "CAMEROUN", flag: "🇨🇲" }, { name: "NIGERIA", flag: "🇳🇬" },
            { name: "AFRIQUE DU SUD", flag: "🇿🇦" }, { name: "ANGOLA", flag: "🇦🇴" },
            { name: "GABON", flag: "🇬🇦" }, { name: "ZAMBIE", flag: "🇿🇲" },
            { name: "MALI", flag: "🇲🇱" }, { name: "CÔTE D'IVOIRE", flag: "🇨🇮" },
            { name: "ÉGYPTE", flag: "🇪🇬" }, { name: "OUGANDA", flag: "🇺🇬" },
            { name: "GUINÉE ÉQ.", flag: "🇬🇶" }, { name: "SÉNÉGAL", flag: "🇸🇳" },
            { name: "ALGÉRIE", flag: "🇩🇿" }, { name: "TUNISIE", flag: "🇹🇳" },
            { name: "MAROC", flag: "🇲🇦" }, { name: "MOZAMBIQUE", flag: "🇲🇿" },
            { name: "GHANA", flag: "🇬🇭" }, { name: "RDC CONGO", flag: "🇨🇩" },
            { name: "BURKINA FASO", flag: "🇧🇫" }, { name: "BENIN", flag: "🇧🇯" }
        ];

        // Lojika famantaranandro 2 minitra mitohy
        function updateTimelineAndTimer() {
            const now = new Date();
            const container = document.getElementById('time-slots');
            container.innerHTML = '';

            // Fikajiana ny tsingerina 2 minitra ho avy
            let currentMinutes = now.getMinutes();
            let startMinute = currentMinutes - (currentMinutes % 2);
            
            let baseTime = new Date(now.getTime());
            baseTime.setMinutes(startMinute);
            baseTime.setSeconds(0);

            // Mikajy ny countdown timer ho an'ilay lera mavitrika izao
            let nextCycle = new Date(baseTime.getTime() + 2 * 60 * 1000);
            let diffMs = nextCycle - now;
            let diffMin = Math.floor(diffMs / 60000);
            let diffSec = Math.floor((diffMs % 60000) / 1000);
            let countdownStr = `${String(diffMin).padStart(2, '0')}:${String(diffSec).padStart(2, '0')}`;

            // Mamorona lera 6 mifanesy (3 taloha, 1 izao, 2 ho avy)
            for (let i = -3; i <= 2; i++) {
                let slotTime = new Date(baseTime.getTime() + (i * 2) * 60 * 1000);
                let hours = String(slotTime.getHours()).padStart(2, '0');
                let mins = String(slotTime.getMinutes()).padStart(2, '0');
                let timeStr = `${hours}:${mins}`;

                let span = document.createElement('span');
                if (i === 0) {
                    // Ny lera mavitrika izao misy countdown
                    span.className = "px-2.5 py-1 rounded bg-red-600 text-white font-extrabold shadow-sm flex flex-col items-center";
                    span.innerHTML = `<div>${timeStr}</div><div class="text-[9px] font-normal text-red-100">${countdownStr}</div>`;
                } else {
                    span.className = "px-2.5 py-1.5 rounded bg-gray-50 text-gray-500 border border-gray-100";
                    span.innerText = timeStr;
                }
                container.appendChild(span);
            }
        }

        // Fampisehoana ny Tabs samihafa
        function changeTab(tab) {
            currentTab = tab;
            ['1X2', 'DC', 'OU', 'BTTS', 'CS'].forEach(t => {
                const btn = document.getElementById(`btn-${t}`);
                if (t === tab) {
                    btn.className = "px-3 py-1.5 rounded bg-green-600 text-white shadow-xs";
                } else {
                    btn.className = "px-3 py-1.5 rounded bg-gray-200 text-gray-700";
                }
            });

            // Ovaina ny lohatenin'ny tabilao
            const h1 = document.getElementById('col-header-1');
            const h2 = document.getElementById('col-header-2');
            if (tab === '1X2') { h1.innerText = '1'; h2.innerText = 'X'; }
            else if (tab === 'DC') { h1.innerText = '1X'; h2.innerText = '12'; }
            else if (tab === 'OU') { h1.innerText = 'OVER 2.5'; h2.innerText = 'UNDER 2.5'; }
            else if (tab === 'BTTS') { h1.innerText = 'OUI'; h2.innerText = 'NON'; }
            else if (tab === 'CS') { h1.innerText = 'PREDI'; h2.innerText = 'ALT'; }

            renderMatches();
        }

        // Famoronana lalao 10 miaraka amin'ny Simulation algorithm predictive
        function renderMatches() {
            const container = document.getElementById('matches-container');
            container.innerHTML = '';

            const now = new Date();
            let currentMinutes = now.getMinutes();
            let startMinute = currentMinutes - (currentMinutes % 2);
            let hours = String(now.getHours()).padStart(2, '0');
            let mins = String(startMinute).padStart(2, '0');
            let matchTime = `${hours}:${mins}`;

            // Shuffle ekipa isaky ny 2 minitra mba hiovaova foana
            let shuffledTeams = [...teams].sort(() => 0.5 - Math.random());

            for (let i = 0; i < 10; i++) {
                let home = shuffledTeams[i * 2];
                let away = shuffledTeams[i * 2 + 1];

                // Algorithm RNG predictive miteraka odds sy probability
                let odd1 = (1.3 + Math.random() * 2).toFixed(2);
                let odd2 = (1.4 + Math.random() * 2).toFixed(2);
                let scoreHome = Math.floor(Math.random() * 3);
                let scoreAway = Math.floor(Math.random() * 3);
                let proba = Math.floor(25 + Math.random() * 50);

                let row = document.createElement('div');
                row.className = "grid grid-cols-4 items-center gap-1.5 p-2.5 text-xs font-semibold";

                row.innerHTML = `
                    <div class="flex flex-col justify-center">
                        <div class="text-[9px] text-gray-400 font-normal mb-1">🕒 ${matchTime}</div>
                        <div class="flex items-center gap-1 text-gray-800 font-bold truncate"><span>${home.flag}</span> <span>${home.name}</span></div>
                        <div class="flex items-center gap-1 text-gray-800 font-bold truncate mt-0.5"><span>${away.flag}</span> <span>${away.name}</span></div>
                    </div>
                    <div class="bg-gray-50 border border-gray-200 py-2 rounded-lg text-center active:scale-95 transition-transform">
                        <div class="text-[9px] text-gray-400 font-normal">${document.getElementById('col-header-1').innerText}</div>
                        <div class="text-gray-900 font-extrabold mt-0.5">${odd1}</div>
                    </div>
                    <div class="bg-gray-50 border border-gray-200 py-2 rounded-lg text-center active:scale-95 transition-transform">
                        <div class="text-[9px] text-gray-400 font-normal">${document.getElementById('col-header-2').innerText}</div>
                        <div class="text-gray-900 font-extrabold mt-0.5">${odd2}</div>
                    </div>
                    <div class="bg-green-50 border border-green-200 py-1.5 rounded-lg text-center flex flex-col items-center justify-center">
                        <div class="font-black text-green-800 text-sm tracking-tighter">${scoreHome}-${scoreAway}</div>
                        <div class="text-[9px] text-green-600 font-bold bg-green-100 px-1.5 py-0.2 rounded-full mt-0.5">(${proba}%)</div>
                    </div>
                `;
                container.appendChild(row);
            }
        }

        // Mandefa ny famantaranandro sy mamelona lalao vaovao rehefa tapitra ny 2 minitra
        setInterval(() => {
            updateTimelineAndTimer();
            // Raha vao dila ny 2 minitra (00:00) dia manova ny lalao ho azy
            const now = new Date();
            if (now.getSeconds() === 0 && now.getMinutes() % 2 === 0) {
                renderMatches();
            }
        }, 1000);

        // Fanombohana voalohany
        updateTimelineAndTimer();
        renderMatches();
    </script>
</body>
</html>
